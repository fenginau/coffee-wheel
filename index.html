<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Wheel</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2e6d5;
      color: #1f1d1a;
    }

    body {
      text-align: center;
    }

    .page {
      width: 100%;
      min-height: 100%;
      padding-top: 30px;
      padding-bottom: 30px;
      overflow: hidden;
    }

    .main {
      width: 100%;
      position: relative;
    }

    .include-panel {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 240px;
      padding: 16px 18px;
      border: 2px solid #d0bda2;
      background: #f8f0e4;
      text-align: left;
    }

    .include-title {
      margin: 0 0 14px 0;
      font-size: 26px;
      font-weight: bold;
    }

    .include-option {
      display: block;
      margin-bottom: 14px;
      font-size: 22px;
      line-height: 28px;
      cursor: pointer;
    }

    .include-option input {
      margin-right: 10px;
      vertical-align: middle;
    }

    .wheel-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      margin: 0 auto;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      margin-left: -22px;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 40px solid #b33a3a;
      z-index: 2;
      -webkit-transform: rotate(180deg);
      transform: rotate(180deg);
    }

    #wheel {
      position: absolute;
      top: 28px;
      left: 0;
      width: 340px;
      height: 340px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      -webkit-transform: rotate(0deg);
      transform: rotate(0deg);
      -webkit-transition: -webkit-transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
      transition: transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
    }

    .draw-button {
      display: inline-block;
      width: 260px;
      margin-top: 64px;
      padding: 18px 0;
      border: 0;
      border-radius: 12px;
      background: #b33a3a;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
    }

    .draw-button:disabled {
      background: #9d7d7d;
      cursor: default;
    }

    .result {
      min-height: 32px;
      margin-top: 22px;
      font-size: 28px;
      font-weight: bold;
    }

    .wheel-panel {
      width: 100%;
    }

    @media screen and (max-width: 420px) {
      .main {
        width: 100%;
      }

      .include-panel {
        position: static;
        width: 260px;
        margin: 24px auto 0 auto;
      }

      .wheel-wrap {
        width: 300px;
        height: 300px;
      }

      #wheel {
        width: 300px;
        height: 300px;
      }

      .draw-button {
        width: 220px;
        font-size: 28px;
      }

      .result {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="main">
      <div class="wheel-panel">
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <canvas id="wheel" width="340" height="340"></canvas>
        </div>

        <button class="draw-button" id="drawButton" type="button">Draw</button>
        <div class="result" id="result"></div>
      </div>

      <div class="include-panel">
        <div class="include-title">Include</div>
        <label class="include-option">
          <input id="optionAot" type="checkbox">Attack on Titan
        </label>
        <label class="include-option">
          <input id="optionWork" type="checkbox">Back to work
        </label>
      </div>
    </div>
    <audio id="attackThemeAudio" preload="auto">
      <source src="aot.mp3" type="audio/mpeg">
      <!-- <source src="attack-theme.wav" type="audio/wav"> -->
    </audio>
  </div>

  <script>
    (function () {
      var SPECIAL_AOT = "Attack on Titan";
      var SPECIAL_WORK = "Back to work";
      var baseOptions = ["Coffee", "Ice Cream", "Beer", "Tea"];
      var options = [];
      var colors = ["#7f5539", "#d9a441", "#4b7baf", "#4f8a5b", "#7a4869", "#5e6b2f"];
      var segmentSize = 90;
      var dotCount = 50;
      var canvas = document.getElementById("wheel");
      var drawButton = document.getElementById("drawButton");
      var result = document.getElementById("result");
      var optionAot = document.getElementById("optionAot");
      var optionWork = document.getElementById("optionWork");
      var attackThemeAudio = document.getElementById("attackThemeAudio");
      var context = canvas.getContext("2d");
      var currentRotation = 0;
      var isSpinning = false;
      var selectedIndex = null;
      var aotToggleCount = 0;
      var pendingAttackOnTitan = false;
      var isDragging = false;
      var dragMoved = false;
      var dragResultIndex = null;
      var dragStartAngle = 0;
      var dragStartRotation = 0;
      var lastPointerAngle = 0;
      var velocitySamples = [];
      var inertiaVelocity = 0;
      var inertiaTimer = null;
      var tickTimer = null;
      var lastTickAngle = null;
      var audioContext = null;
      var audioUnlocked = false;
      var noiseBuffer = null;
      var animationFrame =
        window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        function (callback) {
          return window.setTimeout(function () {
            callback(new Date().getTime());
          }, 16);
        };
      var cancelAnimationFrameCompat =
        window.cancelAnimationFrame ||
        window.webkitCancelAnimationFrame ||
        window.clearTimeout;

      function normalizeAngle(angle) {
        angle = angle % 360;
        if (angle < 0) {
          angle += 360;
        }
        return angle;
      }

      function getCurrentTime() {
        return new Date().getTime();
      }

      function ensureAudioContext() {
        var AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return null;
        }

        if (!audioContext) {
          try {
            audioContext = new AudioContextClass();
          } catch (error) {
            audioContext = null;
          }
        }

        return audioContext;
      }

      function ensureNoiseBuffer() {
        var contextInstance = ensureAudioContext();
        var bufferSize;
        var buffer;
        var data;
        var i;

        if (!contextInstance) {
          return null;
        }

        if (noiseBuffer) {
          return noiseBuffer;
        }

        try {
          bufferSize = Math.max(1, Math.floor(contextInstance.sampleRate * 0.03));
          buffer = contextInstance.createBuffer(1, bufferSize, contextInstance.sampleRate);
          data = buffer.getChannelData(0);
          for (i = 0; i < bufferSize; i += 1) {
            data[i] = Math.random() * 2 - 1;
          }
          noiseBuffer = buffer;
        } catch (error) {
          noiseBuffer = null;
        }

        return noiseBuffer;
      }

      function unlockAudio() {
        var contextInstance = ensureAudioContext();

        if (!contextInstance || audioUnlocked) {
          return;
        }

        if (contextInstance.resume) {
          contextInstance.resume();
        }

        audioUnlocked = true;
      }

      function playAttackThemeCue() {
        if (!attackThemeAudio) {
          return;
        }

        stopAttackTheme();

        try {
          attackThemeAudio.currentTime = 0;
          attackThemeAudio.play();
        } catch (error) {
          return;
        }

        try {
          attackThemeAudio._stopTimer = window.setTimeout(function () {
            stopAttackTheme();
          }, 5000);
        } catch (error) {
          return;
        }
      }

      function stopAttackTheme() {
        if (!attackThemeAudio) {
          return;
        }

        if (attackThemeAudio._stopTimer) {
          window.clearTimeout(attackThemeAudio._stopTimer);
          attackThemeAudio._stopTimer = null;
        }

        try {
          attackThemeAudio.pause();
          attackThemeAudio.currentTime = 0;
        } catch (error) {
          return;
        }
      }

      function getPointFromEvent(event) {
        var point = event;
        if (event.touches && event.touches.length) {
          point = event.touches[0];
        } else if (event.changedTouches && event.changedTouches.length) {
          point = event.changedTouches[0];
        }
        return point;
      }

      function getPointerAngle(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        return Math.atan2(clientY - centerY, clientX - centerX) * 180 / Math.PI + 90;
      }

      function getAngleDelta(currentAngle, previousAngle) {
        var delta = currentAngle - previousAngle;
        while (delta > 180) {
          delta -= 360;
        }
        while (delta < -180) {
          delta += 360;
        }
        return delta;
      }

      function setWheelTransition(enabled) {
        if (enabled) {
          canvas.style.webkitTransition = "-webkit-transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1)";
          canvas.style.transition = "transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1)";
        } else {
          canvas.style.webkitTransition = "none";
          canvas.style.transition = "none";
        }
      }

      function resizeCanvas() {
        var size = 340;
        if (window.innerWidth && window.innerWidth <= 420) {
          size = 300;
        }
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";
        drawWheel();
      }

      function setIncludeDisabled(disabled) {
        optionAot.disabled = disabled;
        optionWork.disabled = disabled;
      }

      function isBypassOption(optionName) {
        return optionName === SPECIAL_AOT || optionName === SPECIAL_WORK;
      }

      function getWrappedIndex(index) {
        if (!options.length) {
          return 0;
        }
        while (index < 0) {
          index += options.length;
        }
        return index % options.length;
      }

      function getSectorIndexFromAngle(angle) {
        return getWrappedIndex(Math.floor(normalizeAngle(angle + segmentSize / 2) / segmentSize));
      }

      function getPointerDotAngle(rotationAngle) {
        return normalizeAngle(360 - normalizeAngle(rotationAngle));
      }

      function playTickSound() {
        var contextInstance = ensureAudioContext();
        var buffer;
        var source;
        var filter;
        var gain;
        var now;

        if (!contextInstance || !audioUnlocked) {
          return;
        }

        if (contextInstance.state === "suspended" && contextInstance.resume) {
          contextInstance.resume();
        }

        try {
          buffer = ensureNoiseBuffer();
          if (!buffer) {
            return;
          }

          source = contextInstance.createBufferSource();
          source.buffer = buffer;
          filter = contextInstance.createBiquadFilter();
          gain = contextInstance.createGain();
          now = contextInstance.currentTime;

          filter.type = "bandpass";
          filter.frequency.setValueAtTime(1700, now);
          filter.Q.setValueAtTime(1.4, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.linearRampToValueAtTime(0.09, now + 0.001);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);

          source.connect(filter);
          filter.connect(gain);
          gain.connect(contextInstance.destination);
          source.start(now);
          source.stop(now + 0.03);
        } catch (error) {
          return;
        }
      }

      function stopTicking() {
        if (tickTimer !== null) {
          cancelAnimationFrameCompat(tickTimer);
          tickTimer = null;
        }
        lastTickAngle = null;
      }

      function watchTicks() {
        var dotSize = 360 / dotCount;
        var pointerAngle = getPointerDotAngle(getRenderedWheelRotation());
        var delta;
        var crossedCount;
        var i;

        if (lastTickAngle === null) {
          lastTickAngle = pointerAngle;
        } else {
          delta = getAngleDelta(pointerAngle, lastTickAngle);
          crossedCount = Math.floor(Math.abs(delta) / dotSize);

          if (crossedCount > 0) {
            if (crossedCount > 6) {
              crossedCount = 6;
            }
            for (i = 0; i < crossedCount; i += 1) {
              playTickSound();
            }
            lastTickAngle = pointerAngle;
          }
        }

        if (!isSpinning) {
          stopTicking();
          return;
        }

        tickTimer = animationFrame(watchTicks);
      }

      function startTicking() {
        stopTicking();
        lastTickAngle = getPointerDotAngle(getRenderedWheelRotation());
        tickTimer = animationFrame(watchTicks);
      }

      function buildSpinTarget(requestedIndex, spinDirection, allowBypass) {
        var resolvedIndex = requestedIndex;
        var minAngle;
        var maxAngle;
        var targetAngle;
        var bypassMinOffset = 1;
        var bypassMaxOffset = 5;
        var landedIndex;
        var bypassBoundaryAngle;

        if (allowBypass && isBypassOption(options[requestedIndex])) {
          if (spinDirection < 0) {
            bypassBoundaryAngle = requestedIndex * segmentSize + segmentSize / 2;
            targetAngle = normalizeAngle(
              bypassBoundaryAngle + bypassMinOffset + Math.random() * (bypassMaxOffset - bypassMinOffset)
            );
          } else {
            bypassBoundaryAngle = requestedIndex * segmentSize - segmentSize / 2;
            targetAngle = normalizeAngle(
              bypassBoundaryAngle - bypassMinOffset - Math.random() * (bypassMaxOffset - bypassMinOffset)
            );
          }
          landedIndex = getSectorIndexFromAngle(targetAngle);
          resolvedIndex = landedIndex;
        } else {
          minAngle = requestedIndex * segmentSize - segmentSize / 2 + 10;
          maxAngle = requestedIndex * segmentSize + segmentSize / 2 - 10;
          targetAngle = minAngle + Math.random() * (maxAngle - minAngle);
          resolvedIndex = requestedIndex;
        }

        return {
          targetAngle: targetAngle,
          resultIndex: resolvedIndex
        };
      }

      function rebuildOptions() {
        options = ["Coffee"];

        if (optionAot.checked) {
          options.push(SPECIAL_AOT);
        }

        options.push("Ice Cream", "Beer");

        if (optionWork.checked) {
          options.push(SPECIAL_WORK);
        }

        options.push("Tea");

        segmentSize = 360 / options.length;
        selectedIndex = null;
        dragResultIndex = null;
        result.innerHTML = "";
        drawWheel();
      }

      function drawWheel() {
        var size = canvas.width;
        var center = size / 2;
        var radius = center - 10;
        var textRadius = radius * 0.58;
        var i;

        context.clearRect(0, 0, size, size);

        for (i = 0; i < options.length; i += 1) {
          var startAngle = (-90 - segmentSize / 2 + i * segmentSize) * Math.PI / 180;
          var endAngle = startAngle + segmentSize * Math.PI / 180;
          var centerAngle = startAngle + (endAngle - startAngle) / 2;
          var textX = center + Math.cos(centerAngle) * textRadius;
          var textY = center + Math.sin(centerAngle) * textRadius;

          context.beginPath();
          context.moveTo(center, center);
          context.arc(center, center, radius, startAngle, endAngle, false);
          context.closePath();
          context.fillStyle = colors[i % colors.length];
          context.fill();

          context.save();
          context.fillStyle = "#fffdf8";
          context.font = (size <= 300 ? "bold 16px Arial" : "bold 18px Arial");
          context.textAlign = "center";
          context.textBaseline = "middle";
          wrapText(options[i], textX, textY, size <= 300 ? 76 : 88, size <= 300 ? 18 : 20);
          context.restore();
        }

        context.beginPath();
        context.arc(center, center, radius, 0, Math.PI * 2, false);
        context.lineWidth = 10;
        context.strokeStyle = "#ffffff";
        context.stroke();

        for (i = 0; i < dotCount; i += 1) {
          var dotAngle = (-90 + (i * 360 / dotCount)) * Math.PI / 180;
          var dotRadius = radius - 2;
          var dotX = center + Math.cos(dotAngle) * dotRadius;
          var dotY = center + Math.sin(dotAngle) * dotRadius;

          context.beginPath();
          context.arc(dotX, dotY, size <= 300 ? 3 : 4, 0, Math.PI * 2, false);
          context.fillStyle = "#f6f0e8";
          context.fill();
        }

        context.beginPath();
        context.arc(center, center, 28, 0, Math.PI * 2, false);
        context.fillStyle = "#ecd2a1";
        context.fill();
        context.lineWidth = 5;
        context.strokeStyle = "#ffffff";
        context.stroke();
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        var words = text.split(" ");
        var lines = [];
        var currentLine = "";
        var i;

        for (i = 0; i < words.length; i += 1) {
          var testLine = currentLine ? currentLine + " " + words[i] : words[i];
          if (context.measureText(testLine).width > maxWidth && currentLine) {
            lines.push(currentLine);
            currentLine = words[i];
          } else {
            currentLine = testLine;
          }
        }

        if (currentLine) {
          lines.push(currentLine);
        }

        var startY = y - ((lines.length - 1) * lineHeight) / 2;
        for (i = 0; i < lines.length; i += 1) {
          context.fillText(lines[i], x, startY + i * lineHeight);
        }
      }

      function getSectorIndexFromPoint(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        var dx = clientX - centerX;
        var dy = clientY - centerY;
        var distance = Math.sqrt(dx * dx + dy * dy);
        var radius = rect.width / 2;
        var clickAngle;
        var wheelAngle;

        if (distance > radius) {
          return null;
        }

        clickAngle = normalizeAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
        wheelAngle = normalizeAngle(clickAngle - normalizeAngle(currentRotation));

        return Math.floor(normalizeAngle(wheelAngle + segmentSize / 2) / segmentSize);
      }

      function setWheelRotation(angle) {
        canvas.style.webkitTransform = "rotate(" + angle + "deg)";
        canvas.style.transform = "rotate(" + angle + "deg)";
      }

      function getRenderedWheelRotation() {
        var computedStyle;
        var transformValue;
        var values;
        var a;
        var b;

        if (window.getComputedStyle) {
          computedStyle = window.getComputedStyle(canvas, null);
          transformValue =
            computedStyle.transform ||
            computedStyle.webkitTransform ||
            computedStyle.mozTransform ||
            computedStyle.msTransform;
        } else {
          transformValue = canvas.style.transform || canvas.style.webkitTransform;
        }

        if (!transformValue || transformValue === "none") {
          return currentRotation;
        }

        if (transformValue.indexOf("matrix(") === 0) {
          values = transformValue.substring(7, transformValue.length - 1).split(",");
          a = parseFloat(values[0]);
          b = parseFloat(values[1]);
          return Math.atan2(b, a) * 180 / Math.PI;
        }

        if (transformValue.indexOf("rotate(") === 0) {
          return parseFloat(transformValue.substring(7, transformValue.length - 4)) || currentRotation;
        }

        return currentRotation;
      }

      function stopInertia() {
        if (inertiaTimer !== null) {
          cancelAnimationFrameCompat(inertiaTimer);
          inertiaTimer = null;
        }
        isSpinning = false;
      }

      function stepInertia() {
        currentRotation += inertiaVelocity;
        setWheelRotation(currentRotation);
        inertiaVelocity = inertiaVelocity * 0.97;

        if (inertiaVelocity > -0.08 && inertiaVelocity < 0.08) {
          stopInertia();
          return;
        }

        inertiaTimer = animationFrame(stepInertia);
      }

      function spinToSector(resultIndex, turnCount, spinDirection, allowBypass, doneCallback) {
        var spinTarget;
        var targetRotation;
        var normalizedRotation;
        var rotationDelta;

        setWheelTransition(true);
        isSpinning = true;
        drawButton.disabled = true;
        setIncludeDisabled(true);
        result.innerHTML = "";
        startTicking();

        spinTarget = buildSpinTarget(resultIndex, spinDirection, allowBypass);
        targetRotation = normalizeAngle(360 - spinTarget.targetAngle);
        normalizedRotation = normalizeAngle(currentRotation);
        if (spinDirection < 0) {
          rotationDelta = -1 * (turnCount * 360 + normalizeAngle(normalizedRotation - targetRotation));
        } else {
          rotationDelta = turnCount * 360 + normalizeAngle(targetRotation - normalizedRotation);
        }

        currentRotation += rotationDelta;
        setWheelRotation(currentRotation);

        window.setTimeout(function () {
          result.innerHTML = "Result: " + options[spinTarget.resultIndex];
          if (options[spinTarget.resultIndex] === SPECIAL_AOT) {
            playAttackThemeCue();
          } else {
            stopAttackTheme();
          }
          drawButton.disabled = false;
          setIncludeDisabled(false);
          isSpinning = false;
          stopTicking();
          if (doneCallback) {
            doneCallback();
          }
        }, 4800);
      }

      function beginDrag(event) {
        var point;

        if (isSpinning) {
          return;
        }

        point = getPointFromEvent(event);
        dragResultIndex = getSectorIndexFromPoint(point.clientX, point.clientY);
        if (dragResultIndex === null) {
          return;
        }

        if (event.preventDefault) {
          event.preventDefault();
        }

        unlockAudio();

        isDragging = true;
        dragMoved = false;
        velocitySamples = [];
        dragStartAngle = getPointerAngle(point.clientX, point.clientY);
        dragStartRotation = currentRotation;
        lastPointerAngle = dragStartAngle;
        setWheelTransition(false);
        stopInertia();
      }

      function moveDrag(event) {
        var point;
        var pointerAngle;
        var angleDelta;
        var now;

        if (!isDragging) {
          return;
        }

        point = getPointFromEvent(event);
        pointerAngle = getPointerAngle(point.clientX, point.clientY);
        angleDelta = getAngleDelta(pointerAngle, dragStartAngle);
        currentRotation = dragStartRotation + angleDelta;
        setWheelRotation(currentRotation);

        now = getCurrentTime();
        velocitySamples.push({
          time: now,
          angle: pointerAngle
        });

        while (velocitySamples.length > 6) {
          velocitySamples.shift();
        }

        if (Math.abs(getAngleDelta(pointerAngle, lastPointerAngle)) > 1) {
          dragMoved = true;
        }

        lastPointerAngle = pointerAngle;

        if (event.preventDefault) {
          event.preventDefault();
        }
      }

      function endDrag(event) {
        var point;
        var index;
        var velocity = 0;
        var firstSample;
        var lastSample;
        var deltaAngle;
        var deltaTime;
        var spinDirection;
        var attackIndex;
        var allowBypass = true;

        if (!isDragging) {
          return;
        }

        isDragging = false;
        point = getPointFromEvent(event);

        if (!dragMoved) {
          index = getSectorIndexFromPoint(point.clientX, point.clientY);
          if (index !== null) {
            selectedIndex = index;
            result.innerHTML = "";
          }
          dragResultIndex = null;
          return;
        }

        if (velocitySamples.length >= 2) {
          firstSample = velocitySamples[0];
          lastSample = velocitySamples[velocitySamples.length - 1];
          deltaAngle = getAngleDelta(lastSample.angle, firstSample.angle);
          deltaTime = lastSample.time - firstSample.time;

          if (deltaTime > 0) {
            velocity = deltaAngle / (deltaTime / 16);
          }
        }

        spinDirection = velocity < 0 ? -1 : 1;
        velocity = Math.abs(velocity);

        if (velocity < 0.6) {
          velocity = 0.6;
        }

        if (pendingAttackOnTitan && optionAot.checked) {
          attackIndex = options.indexOf(SPECIAL_AOT);
          if (attackIndex >= 0) {
            dragResultIndex = attackIndex;
            pendingAttackOnTitan = false;
            allowBypass = false;
          }
        }

        spinToSector(
          dragResultIndex,
          1 + Math.floor(Math.abs(velocity) / 12),
          spinDirection,
          allowBypass,
          function () {
            dragResultIndex = null;
          }
        );

        if (event.preventDefault) {
          event.preventDefault();
        }
      }

      drawButton.onclick = function () {
        var resultIndex;
        var availableIndexes = [];
        var attackIndex;
        var allowBypass = true;
        var i;
        if (isSpinning) {
          return;
        }

        if (pendingAttackOnTitan && optionAot.checked) {
          attackIndex = options.indexOf(SPECIAL_AOT);
          resultIndex = attackIndex >= 0 ? attackIndex : 0;
          pendingAttackOnTitan = false;
          allowBypass = false;
        } else if (selectedIndex === null) {
          for (i = 0; i < options.length; i += 1) {
            if (!isBypassOption(options[i])) {
              availableIndexes.push(i);
            }
          }
          resultIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
        } else {
          resultIndex = selectedIndex;
        }
        selectedIndex = null;
        spinToSector(resultIndex, 5, 1, allowBypass);
      };

      if (canvas.addEventListener) {
        canvas.addEventListener("mousedown", beginDrag, false);
        canvas.addEventListener("touchstart", beginDrag, false);
        document.addEventListener("mousemove", moveDrag, false);
        document.addEventListener("touchmove", moveDrag, false);
        document.addEventListener("mouseup", endDrag, false);
        document.addEventListener("touchend", endDrag, false);
        document.addEventListener("touchcancel", endDrag, false);
      } else {
        canvas.onmousedown = beginDrag;
        document.onmousemove = moveDrag;
        document.onmouseup = endDrag;
      }

      if (drawButton.addEventListener) {
        drawButton.addEventListener("mousedown", unlockAudio, false);
        drawButton.addEventListener("touchstart", unlockAudio, false);
      } else {
        drawButton.onmousedown = unlockAudio;
      }

      function handleAotChange() {
        aotToggleCount += 1;
        if (aotToggleCount >= 5) {
          pendingAttackOnTitan = true;
          aotToggleCount = 0;
        }
        rebuildOptions();
      }

      if (optionAot.addEventListener) {
        optionAot.addEventListener("change", handleAotChange, false);
        optionWork.addEventListener("change", rebuildOptions, false);
      } else {
        optionAot.onchange = handleAotChange;
        optionWork.onchange = rebuildOptions;
      }

      rebuildOptions();
      resizeCanvas();
      setWheelRotation(0);

      if (window.addEventListener) {
        window.addEventListener("resize", resizeCanvas, false);
      } else if (window.attachEvent) {
        window.attachEvent("onresize", resizeCanvas);
      }
    }());
  </script>
</body>
</html>
