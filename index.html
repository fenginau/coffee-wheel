<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prize Wheel</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2e6d5;
      color: #1f1d1a;
    }

    body {
      text-align: center;
    }

    .page {
      width: 100%;
      min-height: 100%;
      padding-top: 30px;
      padding-bottom: 30px;
    }

    .wheel-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      margin: 0 auto;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      margin-left: -22px;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 40px solid #b33a3a;
      z-index: 2;
      -webkit-transform: rotate(180deg);
      transform: rotate(180deg);
    }

    #wheel {
      position: absolute;
      top: 28px;
      left: 0;
      width: 340px;
      height: 340px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      -webkit-transform: rotate(0deg);
      transform: rotate(0deg);
      -webkit-transition: -webkit-transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
      transition: transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
    }

    .draw-button {
      display: inline-block;
      width: 260px;
      margin-top: 64px;
      padding: 18px 0;
      border: 0;
      border-radius: 12px;
      background: #b33a3a;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
    }

    .draw-button:disabled {
      background: #9d7d7d;
      cursor: default;
    }

    .result {
      min-height: 32px;
      margin-top: 22px;
      font-size: 28px;
      font-weight: bold;
    }

    @media screen and (max-width: 420px) {
      .wheel-wrap {
        width: 300px;
        height: 300px;
      }

      #wheel {
        width: 300px;
        height: 300px;
      }

      .draw-button {
        width: 220px;
        font-size: 28px;
      }

      .result {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="340" height="340"></canvas>
    </div>

    <button class="draw-button" id="drawButton" type="button">Draw</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    (function () {
      var options = ["Coffee", "Ice Cream", "Beer", "Tea"];
      var colors = ["#7f5539", "#d9a441", "#4b7baf", "#4f8a5b"];
      var segmentSize = 360 / options.length;
      var canvas = document.getElementById("wheel");
      var drawButton = document.getElementById("drawButton");
      var result = document.getElementById("result");
      var context = canvas.getContext("2d");
      var currentRotation = 0;
      var isSpinning = false;
      var selectedIndex = null;
      var isDragging = false;
      var dragMoved = false;
      var dragStartAngle = 0;
      var dragStartRotation = 0;
      var lastPointerAngle = 0;
      var velocitySamples = [];
      var inertiaVelocity = 0;
      var inertiaTimer = null;
      var animationFrame =
        window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        function (callback) {
          return window.setTimeout(function () {
            callback(new Date().getTime());
          }, 16);
        };
      var cancelAnimationFrameCompat =
        window.cancelAnimationFrame ||
        window.webkitCancelAnimationFrame ||
        window.clearTimeout;

      function normalizeAngle(angle) {
        angle = angle % 360;
        if (angle < 0) {
          angle += 360;
        }
        return angle;
      }

      function getCurrentTime() {
        return new Date().getTime();
      }

      function getPointFromEvent(event) {
        var point = event;
        if (event.touches && event.touches.length) {
          point = event.touches[0];
        } else if (event.changedTouches && event.changedTouches.length) {
          point = event.changedTouches[0];
        }
        return point;
      }

      function getPointerAngle(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        return Math.atan2(clientY - centerY, clientX - centerX) * 180 / Math.PI + 90;
      }

      function getAngleDelta(currentAngle, previousAngle) {
        var delta = currentAngle - previousAngle;
        while (delta > 180) {
          delta -= 360;
        }
        while (delta < -180) {
          delta += 360;
        }
        return delta;
      }

      function setWheelTransition(enabled) {
        if (enabled) {
          canvas.style.webkitTransition = "-webkit-transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1)";
          canvas.style.transition = "transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1)";
        } else {
          canvas.style.webkitTransition = "none";
          canvas.style.transition = "none";
        }
      }

      function resizeCanvas() {
        var size = 340;
        if (window.innerWidth && window.innerWidth <= 420) {
          size = 300;
        }
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";
        drawWheel();
      }

      function drawWheel() {
        var size = canvas.width;
        var center = size / 2;
        var radius = center - 10;
        var textRadius = radius * 0.58;
        var i;

        context.clearRect(0, 0, size, size);

        for (i = 0; i < options.length; i += 1) {
          var startAngle = (-90 - 45 + i * segmentSize) * Math.PI / 180;
          var endAngle = startAngle + segmentSize * Math.PI / 180;
          var centerAngle = startAngle + (endAngle - startAngle) / 2;
          var textX = center + Math.cos(centerAngle) * textRadius;
          var textY = center + Math.sin(centerAngle) * textRadius;

          context.beginPath();
          context.moveTo(center, center);
          context.arc(center, center, radius, startAngle, endAngle, false);
          context.closePath();
          context.fillStyle = colors[i];
          context.fill();

          context.save();
          context.fillStyle = "#fffdf8";
          context.font = (size <= 300 ? "bold 18px Arial" : "bold 20px Arial");
          context.textAlign = "center";
          context.textBaseline = "middle";
          wrapText(options[i], textX, textY, size <= 300 ? 84 : 96, 20);
          context.restore();
        }

        context.beginPath();
        context.arc(center, center, radius, 0, Math.PI * 2, false);
        context.lineWidth = 10;
        context.strokeStyle = "#ffffff";
        context.stroke();

        context.beginPath();
        context.arc(center, center, 28, 0, Math.PI * 2, false);
        context.fillStyle = "#ecd2a1";
        context.fill();
        context.lineWidth = 5;
        context.strokeStyle = "#ffffff";
        context.stroke();
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        var words = text.split(" ");
        var lines = [];
        var currentLine = "";
        var i;

        for (i = 0; i < words.length; i += 1) {
          var testLine = currentLine ? currentLine + " " + words[i] : words[i];
          if (context.measureText(testLine).width > maxWidth && currentLine) {
            lines.push(currentLine);
            currentLine = words[i];
          } else {
            currentLine = testLine;
          }
        }

        if (currentLine) {
          lines.push(currentLine);
        }

        var startY = y - ((lines.length - 1) * lineHeight) / 2;
        for (i = 0; i < lines.length; i += 1) {
          context.fillText(lines[i], x, startY + i * lineHeight);
        }
      }

      function getSectorIndexFromPoint(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        var dx = clientX - centerX;
        var dy = clientY - centerY;
        var distance = Math.sqrt(dx * dx + dy * dy);
        var radius = rect.width / 2;
        var clickAngle;
        var wheelAngle;

        if (distance > radius) {
          return null;
        }

        clickAngle = normalizeAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
        wheelAngle = normalizeAngle(clickAngle - normalizeAngle(currentRotation));

        return Math.floor(normalizeAngle(wheelAngle + segmentSize / 2) / segmentSize);
      }

      function setWheelRotation(angle) {
        canvas.style.webkitTransform = "rotate(" + angle + "deg)";
        canvas.style.transform = "rotate(" + angle + "deg)";
      }

      function stopInertia() {
        if (inertiaTimer !== null) {
          cancelAnimationFrameCompat(inertiaTimer);
          inertiaTimer = null;
        }
        isSpinning = false;
      }

      function stepInertia() {
        currentRotation += inertiaVelocity;
        setWheelRotation(currentRotation);
        inertiaVelocity = inertiaVelocity * 0.97;

        if (inertiaVelocity > -0.08 && inertiaVelocity < 0.08) {
          stopInertia();
          return;
        }

        inertiaTimer = animationFrame(stepInertia);
      }

      function startInertia(initialVelocity) {
        if (initialVelocity > 24) {
          initialVelocity = 24;
        } else if (initialVelocity < -24) {
          initialVelocity = -24;
        }

        if (initialVelocity > -0.2 && initialVelocity < 0.2) {
          return;
        }

        stopInertia();
        setWheelTransition(false);
        inertiaVelocity = initialVelocity;
        isSpinning = true;
        inertiaTimer = animationFrame(stepInertia);
      }

      function beginDrag(event) {
        var point;

        if (isSpinning) {
          return;
        }

        point = getPointFromEvent(event);
        if (getSectorIndexFromPoint(point.clientX, point.clientY) === null) {
          return;
        }

        if (event.preventDefault) {
          event.preventDefault();
        }

        isDragging = true;
        dragMoved = false;
        velocitySamples = [];
        dragStartAngle = getPointerAngle(point.clientX, point.clientY);
        dragStartRotation = currentRotation;
        lastPointerAngle = dragStartAngle;
        setWheelTransition(false);
        stopInertia();
      }

      function moveDrag(event) {
        var point;
        var pointerAngle;
        var angleDelta;
        var now;

        if (!isDragging) {
          return;
        }

        point = getPointFromEvent(event);
        pointerAngle = getPointerAngle(point.clientX, point.clientY);
        angleDelta = getAngleDelta(pointerAngle, dragStartAngle);
        currentRotation = dragStartRotation + angleDelta;
        setWheelRotation(currentRotation);

        now = getCurrentTime();
        velocitySamples.push({
          time: now,
          angle: pointerAngle
        });

        while (velocitySamples.length > 6) {
          velocitySamples.shift();
        }

        if (Math.abs(getAngleDelta(pointerAngle, lastPointerAngle)) > 1) {
          dragMoved = true;
        }

        lastPointerAngle = pointerAngle;

        if (event.preventDefault) {
          event.preventDefault();
        }
      }

      function endDrag(event) {
        var point;
        var index;
        var velocity = 0;
        var firstSample;
        var lastSample;
        var deltaAngle;
        var deltaTime;

        if (!isDragging) {
          return;
        }

        isDragging = false;
        point = getPointFromEvent(event);

        if (!dragMoved) {
          index = getSectorIndexFromPoint(point.clientX, point.clientY);
          if (index !== null) {
            selectedIndex = index;
          }
          return;
        }

        if (velocitySamples.length >= 2) {
          firstSample = velocitySamples[0];
          lastSample = velocitySamples[velocitySamples.length - 1];
          deltaAngle = getAngleDelta(lastSample.angle, firstSample.angle);
          deltaTime = lastSample.time - firstSample.time;

          if (deltaTime > 0) {
            velocity = deltaAngle / (deltaTime / 16);
          }
        }

        startInertia(velocity);

        if (event.preventDefault) {
          event.preventDefault();
        }
      }

      drawButton.onclick = function () {
        var resultIndex;
        var extraSpins;
        var minAngle;
        var maxAngle;
        var targetAngle;
        var targetRotation;
        var normalizedRotation;
        var rotationDelta;

        if (isSpinning) {
          return;
        }

        setWheelTransition(true);
        isSpinning = true;
        drawButton.disabled = true;
        result.innerHTML = "";

        if (selectedIndex === null) {
          resultIndex = Math.floor(Math.random() * options.length);
        } else {
          resultIndex = selectedIndex;
        }
        selectedIndex = null;

        extraSpins = 5 * 360;
        minAngle = resultIndex * segmentSize - segmentSize / 2 + 10;
        maxAngle = resultIndex * segmentSize + segmentSize / 2 - 10;
        targetAngle = minAngle + Math.random() * (maxAngle - minAngle);
        targetRotation = normalizeAngle(360 - targetAngle);
        normalizedRotation = normalizeAngle(currentRotation);
        rotationDelta = extraSpins + normalizeAngle(targetRotation - normalizedRotation);

        currentRotation += rotationDelta;
        setWheelRotation(currentRotation);

        window.setTimeout(function () {
          result.innerHTML = "Result: " + options[resultIndex];
          drawButton.disabled = false;
          isSpinning = false;
        }, 4800);
      };

      if (canvas.addEventListener) {
        canvas.addEventListener("mousedown", beginDrag, false);
        canvas.addEventListener("touchstart", beginDrag, false);
        document.addEventListener("mousemove", moveDrag, false);
        document.addEventListener("touchmove", moveDrag, false);
        document.addEventListener("mouseup", endDrag, false);
        document.addEventListener("touchend", endDrag, false);
        document.addEventListener("touchcancel", endDrag, false);
      } else {
        canvas.onmousedown = beginDrag;
        document.onmousemove = moveDrag;
        document.onmouseup = endDrag;
      }

      resizeCanvas();
      setWheelRotation(0);

      if (window.addEventListener) {
        window.addEventListener("resize", resizeCanvas, false);
      } else if (window.attachEvent) {
        window.attachEvent("onresize", resizeCanvas);
      }
    }());
  </script>
</body>
</html>
