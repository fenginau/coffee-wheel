<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Wheel</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2e6d5;
      color: #1f1d1a;
    }

    body {
      text-align: center;
    }

    .nav-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 5;
      display: inline-block;
      padding: 10px 16px;
      border: 2px solid #b33a3a;
      border-radius: 999px;
      background: #fff7ec;
      color: #b33a3a;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
    }

    .page {
      width: 100%;
      min-height: 100%;
      padding-top: 30px;
      padding-bottom: 30px;
      overflow: hidden;
    }

    .main {
      width: 100%;
      position: relative;
    }

    .include-panel {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 240px;
      padding: 16px 18px;
      border: 2px solid #d0bda2;
      background: #f8f0e4;
      text-align: left;
    }

    .include-title {
      margin: 0 0 14px 0;
      font-size: 26px;
      font-weight: bold;
    }

    .include-option {
      display: block;
      margin-bottom: 14px;
      font-size: 22px;
      line-height: 28px;
      cursor: pointer;
    }

    .include-option input {
      margin-right: 10px;
      vertical-align: middle;
    }

    .wheel-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      margin: 0 auto;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      margin-left: -22px;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 40px solid #b33a3a;
      z-index: 2;
      -webkit-transform: rotate(180deg);
      transform: rotate(180deg);
    }

    #wheel {
      position: absolute;
      top: 28px;
      left: 0;
      width: 340px;
      height: 340px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      -webkit-transform: rotate(0deg);
      transform: rotate(0deg);
      -webkit-transition: -webkit-transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
      transition: transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
    }

    .draw-button {
      display: inline-block;
      width: 260px;
      margin-top: 64px;
      padding: 18px 0;
      border: 0;
      border-radius: 12px;
      background: #b33a3a;
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
    }

    .draw-button:disabled {
      background: #9d7d7d;
      cursor: default;
    }

    .result {
      min-height: 32px;
      margin-top: 22px;
      font-size: 28px;
      font-weight: bold;
    }

    .wheel-panel {
      width: 100%;
    }

    @media screen and (max-width: 420px) {
      .main {
        width: 100%;
      }

      .include-panel {
        position: static;
        width: 260px;
        margin: 24px auto 0 auto;
      }

      .wheel-wrap {
        width: 300px;
        height: 300px;
      }

      #wheel {
        width: 300px;
        height: 300px;
      }

      .draw-button {
        width: 220px;
        font-size: 28px;
      }

      .result {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <a class="nav-link" href="task-wheel.html">Task Wheel</a>
  <div class="page">
    <div class="main">
      <div class="wheel-panel">
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <canvas id="wheel" width="340" height="340"></canvas>
        </div>

        <button class="draw-button" id="drawButton" type="button">Draw</button>
        <div class="result" id="result"></div>
      </div>

      <div class="include-panel">
        <div class="include-title">Include</div>
        <label class="include-option">
          <input id="optionAot" type="checkbox">Attack on Titan
        </label>
        <label class="include-option">
          <input id="optionWork" type="checkbox">Back to work
        </label>
      </div>
    </div>
    <audio id="attackThemeAudio" preload="auto">
      <source src="aot.mp3" type="audio/mpeg">
      <!-- <source src="attack-theme.wav" type="audio/wav"> -->
    </audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
