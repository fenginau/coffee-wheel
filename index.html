<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drink Wheel</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe3;
      --panel: #fff8ef;
      --text: #1f1d1a;
      --accent: #b33a3a;
      --accent-dark: #8e2424;
      --shadow: rgba(69, 47, 20, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #fff7ea 0%, var(--bg) 52%, #ead8bc 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .layout {
      width: min(92vw, 760px);
      display: grid;
      justify-items: center;
      gap: 28px;
      padding: 32px 16px;
    }

    .wheel-wrap {
      position: relative;
      width: min(72vw, 460px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-top: 0;
      border-bottom: 42px solid var(--accent);
      filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.18));
      z-index: 2;
    }

    .wheel {
      --label-radius: 126px;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 14px solid #fff;
      box-shadow:
        0 24px 48px var(--shadow),
        inset 0 0 0 8px rgba(255, 255, 255, 0.35);
      background:
        conic-gradient(
          from -45deg,
          #7f5539 0deg 90deg,
          #d9a441 90deg 180deg,
          #4b7baf 180deg 270deg,
          #4f8a5b 270deg 360deg
        );
      position: relative;
      cursor: pointer;
      transition: transform 4.8s cubic-bezier(0.17, 0.67, 0.2, 1);
    }

    .wheel::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 58px;
      height: 58px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff5df, #e5c898);
      border: 6px solid #fff;
      box-shadow: 0 8px 20px rgba(63, 41, 12, 0.2);
    }

    .label {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28%;
      text-align: center;
      font-size: clamp(1.05rem, 1.9vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.15;
      color: #fffdf8;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.28);
      transform-origin: center center;
      pointer-events: none;
    }

    .label-1 { transform: translate(25%, -150%) rotate(-45deg) translateY(calc(var(--label-radius) * -1)) rotate(45deg); }
    .label-2 { transform: translate(50%, -50%) rotate(90deg) }
    .label-3 { transform: translate(-150%, -50%) rotate(-90deg) }
    .label-4 { transform: translate(25%, 50%) rotate(45deg) translateY(calc(var(--label-radius) * 1)) rotate(-225deg); }

    .draw-button {
      min-width: min(70vw, 280px);
      padding: 18px 28px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, #d64b4b 0%, var(--accent-dark) 100%);
      color: #fff;
      font-size: clamp(1.25rem, 3vw, 1.6rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(142, 36, 36, 0.28);
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .draw-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(142, 36, 36, 0.32);
    }

    .draw-button:active {
      transform: translateY(1px);
    }

    .draw-button:disabled {
      cursor: wait;
      opacity: 0.82;
      transform: none;
    }

    .result {
      min-height: 1.6em;
      font-size: clamp(1.2rem, 2.8vw, 1.5rem);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .wheel-wrap {
        width: min(84vw, 380px);
      }

      .wheel {
        --label-radius: 102px;
      }

      .label {
        width: 34%;
        font-size: clamp(0.92rem, 3.6vw, 1.08rem);
      }

    }
  </style>
</head>
<body>
  <main class="layout">
    <div class="wheel-wrap">
      <div class="pointer" aria-hidden="true"></div>
      <div class="wheel" id="wheel" aria-label="Prize wheel">
        <div class="label label-1">Coffee</div>
        <div class="label label-2">Ice Cream</div>
        <div class="label label-3">Beer</div>
        <div class="label label-4">No Drink</div>
      </div>
    </div>

    <button class="draw-button" id="drawButton" type="button">Draw</button>
    <div class="result" id="result" aria-live="polite"></div>
  </main>

  <script>
    const options = ["Coffee", "Ice Cream", "Beer", "No Drink"];
    const segmentSize = 360 / options.length;
    const wheel = document.getElementById("wheel");
    const drawButton = document.getElementById("drawButton");
    const result = document.getElementById("result");

    let currentRotation = 0;
    let isSpinning = false;
    let selectedIndex = null;

    function normalizeAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function getSectorIndexFromPoint(clientX, clientY) {
      const rect = wheel.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = clientX - centerX;
      const dy = clientY - centerY;
      const distance = Math.hypot(dx, dy);

      if (distance > rect.width / 2) {
        return null;
      }

      const clickAngle = normalizeAngle((Math.atan2(dy, dx) * 180) / Math.PI + 90);
      const wheelAngle = normalizeAngle(clickAngle - normalizeAngle(currentRotation));

      return Math.floor(normalizeAngle(wheelAngle + segmentSize / 2) / segmentSize);
    }

    wheel.addEventListener("click", (event) => {
      if (isSpinning) {
        return;
      }

      const index = getSectorIndexFromPoint(event.clientX, event.clientY);
      if (index !== null) {
        selectedIndex = index;
      }
    });

    drawButton.addEventListener("click", () => {
      if (isSpinning) {
        return;
      }

      isSpinning = true;
      drawButton.disabled = true;
      result.textContent = "";

      const resultIndex =
        selectedIndex === null
          ? Math.floor(Math.random() * options.length)
          : selectedIndex;
      const extraSpins = 5 * 360;
      const minAngle = resultIndex * segmentSize - segmentSize / 2 + 10;
      const maxAngle = resultIndex * segmentSize + segmentSize / 2 - 10;
      const targetAngle = minAngle + Math.random() * (maxAngle - minAngle);
      const targetRotation = normalizeAngle(360 - targetAngle);
      const normalizedRotation = normalizeAngle(currentRotation);
      const rotationDelta =
        extraSpins + normalizeAngle(targetRotation - normalizedRotation);

      currentRotation += rotationDelta;
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      window.setTimeout(() => {
        result.textContent = `Result: ${options[resultIndex]}`;
        drawButton.disabled = false;
        isSpinning = false;
      }, 4800);
    });
  </script>
</body>
</html>
